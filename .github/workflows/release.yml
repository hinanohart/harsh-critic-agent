name: GitHub Release on tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        # The agent is prompt-only, not a Python package — no artefacts
        # to attach. The release is a changelog anchor: users pin to a
        # tag when curl-installing the prompt file. --verify-tag guards
        # against a release for a tag that was deleted locally.
        run: |
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
            exit 0
          fi
          INSTALL_NOTE="Install (pin to this version):

\`\`\`bash
mkdir -p ~/.claude/agents
curl -fsSL https://raw.githubusercontent.com/${REPO}/${TAG}/agents/harsh-critic.md \\
  -o ~/.claude/agents/harsh-critic.md
\`\`\`

"
          gh release create "$TAG" \
            --repo "$REPO" \
            --title "$TAG" \
            --verify-tag \
            --generate-notes
          EXISTING=$(gh release view "$TAG" --repo "$REPO" --json body -q .body)
          gh release edit "$TAG" --repo "$REPO" --notes "${INSTALL_NOTE}---

${EXISTING}"

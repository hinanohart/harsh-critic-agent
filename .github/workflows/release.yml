name: GitHub Release on tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
      # Refuse to release anything containing maintainer real-identity markers.
      # FRAG pattern: identity tokens are split at source so this guard rule
      # does not self-match against its own definition. Mirrors aa-animator
      # / yuragi precedent.
      - name: Identity-leak guard (history-wide)
        run: |
          set -euo pipefail
          FRAG_A='run''za'
          FRAG_B='DESKTOP-[A-Z0-9]+'
          FRAG_C='/mnt/c/'
          FRAG_D='hin''ata'
          PATTERN="${FRAG_A}|${FRAG_A}isongpu|${FRAG_B}|${FRAG_C}|/home/${FRAG_A}|${FRAG_D}"
          FAIL=0
          REFS=$(git for-each-ref --format='%(refname)' refs/tags refs/heads refs/remotes)
          REFS="HEAD $REFS"
          for ref in $REFS; do
            if git grep -n -E "$PATTERN" "$ref" -- \
                ':!*.lock' ':!*.svg' ':!*.png' ':!*.jpg' ':!*.mp4' ':!*.gif' ':!*.npy' \
                ':!.github/workflows/release.yml' \
                > /tmp/leaks.txt 2>/dev/null; then
              echo "::error::Identity-leak at ref $ref:"
              cat /tmp/leaks.txt
              FAIL=1
            fi
          done
          exit $FAIL
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        # The agent is prompt-only, not a Python package — no artefacts
        # to attach. The release is a changelog anchor: users pin to a
        # tag when curl-installing the prompt file. --verify-tag guards
        # against a release for a tag that was deleted locally.
        run: |
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
            exit 0
          fi
          INSTALL_NOTE=$(printf 'Install (pin to this version):\n\n```bash\nmkdir -p ~/.claude/agents\ncurl -fsSL https://raw.githubusercontent.com/%s/%s/agents/harsh-critic.md \\\n  -o ~/.claude/agents/harsh-critic.md\n```\n\n' "$REPO" "$TAG")
          gh release create "$TAG" \
            --repo "$REPO" \
            --title "$TAG" \
            --verify-tag \
            --generate-notes
          EXISTING=$(gh release view "$TAG" --repo "$REPO" --json body -q .body)
          NOTES="${INSTALL_NOTE}---
          ${EXISTING}"
          gh release edit "$TAG" --repo "$REPO" --notes "$NOTES"
